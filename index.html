<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing: My Life 🎧</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #3a0ca3);
    color: white;
}

/* Container */
.player {
    max-width: 400px;
    margin: 60px auto;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
}

/* Avatar album */
.cover {
    width: 200px;
    height: 200px;
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

h1 {
    margin: 15px 0 5px;
    font-size: 22px;
}

p {
    opacity: 0.7;
    font-size: 14px;
}

/* Progress bar */
.progress {
    margin: 20px 0;
}

.bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: #ff4dff;
    animation: progress 20s linear infinite;
}

@keyframes progress {
    from { width: 0%; }
    to { width: 100%; }
}

/* Time */
.time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.6;
}

/* Sections */
.section {
    text-align: left;
    margin-top: 20px;
}

/* Playlist item */
.item {
    padding: 10px;
    border-radius: 10px;
    margin: 8px 0;
    transition: 0.3s;
    cursor: pointer;
}

.item:hover {
    background: rgba(255,255,255,0.1);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}
</style>
</head>

<body>

<div class="player">

    <!-- Cover -->
    <img src="https://i.pinimg.com/736x/8e/5c/6a/8e5c6a4e6f3c5a6c0f3b4a3e3b2f8b2d.jpg" class="cover">

    <!-- Title -->
    <h1>My Life 🎧</h1>
    <p>by Ha Thu</p>

    <!-- Progress -->
    <div class="progress">
        <div class="bar">
            <div class="fill"></div>
        </div>
        <div class="time">
            <span>0:00</span>
            <span>∞</span>
        </div>
    </div>

    <!-- About -->
    <div class="section">
        <b>About</b>
        <p>
            Finance & Banking student. 
            Still figuring things out, one step at a time.
        </p>
    </div>

    <!-- Skills -->
    <div class="section">
        <b>Skills</b>
        <div class="item">Excel</div>
        <div class="item">SQL</div>
        <div class="item">Financial Analysis</div>
    </div>

    <!-- Projects as playlist -->
    <div class="section">
        <b>Playlist</b>

        <div class="item">🎵 Bond Valuation</div>
        <div class="item">🎵 Expense Tracking</div>
        <div class="item">🎵 Trying to manage money (still loading...)</div>
    </div>

    <!-- Contact -->
    <div class="section">
        <b>Contact</b>
        <p>your@email.com</p>
    </div>

    <div class="footer">
        now playing: a slightly chaotic life 💜
    </div>

</div>

</body>
</html>
