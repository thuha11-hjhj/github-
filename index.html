<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Now Playing 🎧</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f7e8ff, #fdfcff);
    color: #5a4a6a;
}

/* Layout */
.container {
    max-width: 900px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(15px);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Player */
.player {
    grid-column: span 2;
    text-align: center;
}

/* Disc */
.disc {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: auto;
    background: radial-gradient(circle, #fff 20%, #d9b3ff 60%, #a066ff);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin 6s linear infinite;
}

.disc img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Progress */
.bar {
    height: 6px;
    background: #eee;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: #c084fc;
    animation: progress 15s linear infinite;
}

@keyframes progress {
    from { width: 0; }
    to { width: 100%; }
}

/* Section title */
h2 {
    font-size: 18px;
    margin-bottom: 10px;
}

/* Items */
.item {
    padding: 10px;
    border-radius: 10px;
    margin: 6px 0;
    transition: 0.3s;
    background: #f9f3ff;
}

.item:hover {
    background: #ecd9ff;
    transform: translateX(5px);
}

/* Images */
.imgbox {
    width: 100%;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
    margin-bottom: 10px;
}

/* Floating effect */
.float {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">

    <!-- Player -->
    <div class="card player">
        <div class="disc">
            <img src="https://i.pinimg.com/736x/8e/5c/6a/8e5c6a4e6f3c5a6c0f3b4a3e3b2f8b2d.jpg">
        </div>

        <h1>My Life 🎧</h1>
        <p>by Ha Thu</p>

        <div class="bar">
            <div class="fill"></div>
        </div>
    </div>

    <!-- About -->
    <div class="card">
        <img class="imgbox float" src="https://i.pinimg.com/736x/5f/0c/52/5f0c528ed6eab6c8fbe0b0a77a7bde0b.jpg">
        <h2>About</h2>
        <p>
            Finance & Banking student. Still learning and figuring things out step by step.
        </p>
    </div>

    <!-- Skills -->
    <div class="card">
        <img class="imgbox float" src="https://i.pinimg.com/736x/63/9f/7d/639f7d7b5d78b8b1c08b5a69b6c68f21.jpg">
        <h2>Skills</h2>
        <div class="item">Excel</div>
        <div class="item">SQL</div>
        <div class="item">Financial Analysis</div>
    </div>

    <!-- Playlist -->
    <div class="card">
        <img class="imgbox float" src="https://i.pinimg.com/736x/71/2f/92/712f92c56b2e40a6c0a28b84c4e67f2b.jpg">
        <h2>Playlist</h2>
        <div class="item">🎵 Bond Valuation</div>
        <div class="item">🎵 Expense Tracking</div>
        <div class="item">🎵 Still figuring life out...</div>
    </div>

    <!-- Contact -->
    <div class="card">
        <img class="imgbox float" src="https://i.pinimg.com/736x/92/47/54/924754d47d0a6a3a8a4f54c16c3e6d3b.jpg">
        <h2>Contact</h2>
        <p>your@email.com</p>
    </div>

</div>

</body>
</html>
